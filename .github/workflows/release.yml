name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p stage
          cp target/${{ matrix.target }}/release/crypton-sweep stage/crypton-sweep
          cp README.md LICENSE stage/
          tar -czf "crypton-sweep-${{ matrix.target }}.tar.gz" -C stage .
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/crypton-sweep.exe" stage/crypton-sweep.exe
          Copy-Item README.md, LICENSE stage/
          Compress-Archive -Path stage/* -DestinationPath "crypton-sweep-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: crypton-sweep-${{ matrix.target }}
          path: crypton-sweep-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: crypton-sweep-*
          merge-multiple: true
      - name: Add Unix installer
        run: cp scripts/install.sh dist/crypton-sweep-installer.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --generate-notes
